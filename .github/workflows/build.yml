name: Build Minimal Boot Image with Serial Console

on:
  workflow_dispatch:

env:
  ARCH: arm64
  CROSS_COMPILE: aarch64-linux-gnu-

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget cpio gzip abootimg device-tree-compiler

      - name: Download prebuilt kernel from 99degree/linux
        run: |
          # Find the latest successful artifact from 99degree/linux Actions
          # For simplicity, we'll clone the kernel source and build it directly (faster than hunting artifact)
          git clone --depth 1 --branch lineage-22.2 https://github.com/ArcTici7/linux-miatoll.git kernel
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- sm7125.config
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
          cp arch/arm64/boot/Image ../Image
          # Try to find a DTB – use generic if Huaxing fails
          if [ -f arch/arm64/boot/dts/qcom/sm7125-xiaomi-joyeuse.dtb ]; then
            cp arch/arm64/boot/dts/qcom/sm7125-xiaomi-joyeuse.dtb ../dtb
          else
            # Fallback to any miatoll dtb
            cp $(find arch/arm64/boot/dts/qcom -name "*.dtb" | head -1) ../dtb
          fi
          cd ..
          # Append DTB to kernel (if we have one)
          if [ -f dtb ]; then
            cat Image dtb > Image-dtb
          else
            cp Image Image-dtb
          fi

      - name: Create minimal initramfs with serial console
        run: |
          mkdir -p initramfs/{dev,proc,sys,bin}
          cat > initramfs/init << 'EOF'
          #!/bin/sh
          mount -t proc proc /proc
          mount -t sysfs sysfs /sys
          mount -t devtmpfs devtmpfs /dev
          # Load USB serial gadget module (if built as module; if built-in, ignore)
          modprobe g_serial 2>/dev/null
          echo "Starting shell on USB serial (ttyGS0)" > /dev/ttyGS0
          exec /bin/sh < /dev/ttyGS0 > /dev/ttyGS0 2>&1
          EOF
          chmod +x initramfs/init
          # Download static busybox
          wget -q https://busybox.net/downloads/binaries/1.35.0-x86_64-linux-musl/busybox -O initramfs/bin/busybox
          chmod +x initramfs/bin/busybox
          cd initramfs
          ln -s bin/busybox bin/sh
          ln -s bin/busybox bin/cat
          ln -s bin/busybox bin/mount
          find . | cpio -o -H newc | gzip > ../initrd.gz
          cd ..

      - name: Pack boot.img
        run: |
          cat > bootimg.cfg << EOF
          pagesize = 0x1000
          kerneladdr = 0x00008000
          ramdiskaddr = 0x01000000
          tagsaddr = 0x00000100
          cmdline = console=tty0 console=ttyGS0,115200
          EOF
          abootimg --create boot.img -f bootimg.cfg -k Image-dtb -r initrd.gz

      - name: Upload boot.img
        uses: actions/upload-artifact@v4
        with:
          name: minimal-boot
          path: boot.img
